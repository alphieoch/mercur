# ---------------------------------------------------------------------------
# OpenStore Azure Dev Deployment — Startup Tier
# Builds all container images, pushes to ACR, and deploys to ACA dev environment
# ---------------------------------------------------------------------------
name: Azure Deploy — Dev

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

env:
  AZURE_LOCATION: uksouth
  ACR_NAME: openstorexdevacr
  ENVIRONMENT: dev

permissions:
  id-token: write
  contents: read

jobs:
  ensure-infra:
    name: Ensure Azure Infra Exists
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Resource Group and ACR Exist
        run: |
          RG_NAME="openstorex-${{ env.ENVIRONMENT }}-rg"
          az group show --name "$RG_NAME" >/dev/null 2>&1 || \
            az group create --name "$RG_NAME" --location "${{ env.AZURE_LOCATION }}"
          az acr show --name "${{ env.ACR_NAME }}" --resource-group "$RG_NAME" >/dev/null 2>&1 || \
            az acr create --name "${{ env.ACR_NAME }}" --resource-group "$RG_NAME" --sku Basic --admin-enabled false

  build-and-push:
    name: Build & Push Containers
    runs-on: ubuntu-latest
    needs: ensure-infra
    strategy:
      matrix:
        app: [api, storefront, admin, vendor]
        include:
          - app: api
            context: .
            dockerfile: ./apps/api/Dockerfile
            image_name: api
          - app: storefront
            context: .
            dockerfile: ./apps/storefront/Dockerfile
            image_name: storefront
          - app: admin
            context: .
            dockerfile: ./apps/admin-test/Dockerfile
            image_name: admin
          - app: vendor
            context: .
            dockerfile: ./apps/vendor/Dockerfile
            image_name: vendor

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/openstore/${{ matrix.image_name }}:${{ env.ENVIRONMENT }}
            ${{ env.ACR_NAME }}.azurecr.io/openstore/${{ matrix.image_name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_MEDUSA_BACKEND_URL=${{ secrets.DEV_API_URL }}

  deploy-infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: build-and-push
    outputs:
      apiUrl: ${{ steps.deploy.outputs.apiUrl }}
      storefrontUrl: ${{ steps.deploy.outputs.storefrontUrl }}
      resourceGroupName: ${{ steps.deploy.outputs.resourceGroupName }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Meilisearch Key Exists
        run: |
          KV_NAME=$(az keyvault list --resource-group openstorex-${{ env.ENVIRONMENT }}-rg --query "[0].name" -o tsv)
          if [ -z "$KV_NAME" ]; then
            echo "No Key Vault found in resource group. Skipping meilisearch key check — Bicep will create it."
            exit 0
          fi
          az keyvault secret show --name meili-master-key --vault-name $KV_NAME 2>/dev/null || \
            az keyvault secret set --name meili-master-key --vault-name $KV_NAME --value "$(openssl rand -hex 32)"

      - name: Deploy Bicep
        id: deploy
        run: |
          az deployment sub create \
            --location ${{ env.AZURE_LOCATION }} \
            --template-file infra/main.bicep \
            --parameters infra/parameters.${{ env.ENVIRONMENT }}.json \
            --parameters sqlAdminPassword='${{ secrets.SQL_ADMIN_PASSWORD }}' \
            --query "properties.outputs" \
            --output json | tee outputs.json

          echo "apiUrl=$(jq -r '.apiUrl.value' outputs.json)" >> $GITHUB_OUTPUT
          echo "storefrontUrl=$(jq -r '.storefrontUrl.value' outputs.json)" >> $GITHUB_OUTPUT
          echo "resourceGroupName=$(jq -r '.resourceGroupName.value' outputs.json)" >> $GITHUB_OUTPUT

      - name: Force Container App Rollout
        run: |
          RG_NAME="${{ steps.deploy.outputs.resourceGroupName }}"
          STAMP="${GITHUB_SHA::12}-$(date +%s)"
          for app in api storefront admin vendor; do
            az containerapp update \
              --name "openstorex-${app}-${{ env.ENVIRONMENT }}" \
              --resource-group "$RG_NAME" \
              --set-env-vars IMAGE_STAMP="$STAMP" REDEPLOY_TS="$(date +%s)"
          done

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy-infra

    steps:
      - name: Wait for rollout
        run: sleep 90

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Check API Health
        run: |
          curl -sf ${{ needs.deploy-infra.outputs.apiUrl }}/health || exit 1

      - name: Check Storefront
        run: |
          curl -sf ${{ needs.deploy-infra.outputs.storefrontUrl }} || exit 1

      - name: Show Container Logs on Failure
        if: failure()
        run: |
          az containerapp logs show \
            --name openstorex-api-${{ env.ENVIRONMENT }} \
            --resource-group ${{ needs.deploy-infra.outputs.resourceGroupName }} \
            --tail 50

      - name: Summary
        run: |
          echo "## ✅ Dev Deployment Complete (Startup Tier)" >> $GITHUB_STEP_SUMMARY
          echo "Estimated monthly cost: ~$25-40" >> $GITHUB_STEP_SUMMARY
          echo "- API: ${{ needs.deploy-infra.outputs.apiUrl }}" >> $GITHUB_STEP_SUMMARY
          echo "- Storefront: ${{ needs.deploy-infra.outputs.storefrontUrl }}" >> $GITHUB_STEP_SUMMARY
