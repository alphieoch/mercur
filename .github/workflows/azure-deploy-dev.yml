# ---------------------------------------------------------------------------
# OpenStore Azure Dev Deployment — Startup Tier
# Builds all container images, pushes to ACR, and deploys to ACA dev environment
# ---------------------------------------------------------------------------
name: Azure Deploy — Dev

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: openstore-dev-rg
  AZURE_LOCATION: eastus
  ACR_NAME: openstoredevacr
  ENVIRONMENT: dev

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    name: Build & Push Containers
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [api, storefront, admin, vendor]
        include:
          - app: api
            context: ./apps/api
            dockerfile: ./apps/api/Dockerfile
            image_name: api
          - app: storefront
            context: ./apps/storefront
            dockerfile: ./apps/storefront/Dockerfile
            image_name: storefront
          - app: admin
            context: ./apps/admin-test
            dockerfile: ./apps/admin-test/Dockerfile
            image_name: admin
          - app: vendor
            context: ./apps/vendor
            dockerfile: ./apps/vendor/Dockerfile
            image_name: vendor

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/openstore/${{ matrix.image_name }}:${{ env.ENVIRONMENT }}
            ${{ env.ACR_NAME }}.azurecr.io/openstore/${{ matrix.image_name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_MEDUSA_BACKEND_URL=${{ secrets.DEV_API_URL }}

  deploy-infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: build-and-push
    outputs:
      apiUrl: ${{ steps.deploy.outputs.apiUrl }}
      storefrontUrl: ${{ steps.deploy.outputs.storefrontUrl }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep
        id: deploy
        run: |
          az deployment group create \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters infra/parameters.${{ env.ENVIRONMENT }}.json \
            --parameters sqlAdminPassword='${{ secrets.SQL_ADMIN_PASSWORD }}' \
            --query "properties.outputs" \
            --output json | tee outputs.json

          echo "apiUrl=$(jq -r '.apiUrl.value' outputs.json)" >> $GITHUB_OUTPUT
          echo "storefrontUrl=$(jq -r '.storefrontUrl.value' outputs.json)" >> $GITHUB_OUTPUT

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy-infra

    steps:
      - name: Wait for rollout
        run: sleep 60

      - name: Check API Health
        run: |
          curl -sf ${{ needs.deploy-infra.outputs.apiUrl }}/health || exit 1

      - name: Check Storefront
        run: |
          curl -sf ${{ needs.deploy-infra.outputs.storefrontUrl }} || exit 1

      - name: Summary
        run: |
          echo "## ✅ Dev Deployment Complete (Startup Tier)" >> $GITHUB_STEP_SUMMARY
          echo "Estimated monthly cost: ~$15-25" >> $GITHUB_STEP_SUMMARY
          echo "- API: ${{ needs.deploy-infra.outputs.apiUrl }}" >> $GITHUB_STEP_SUMMARY
          echo "- Storefront: ${{ needs.deploy-infra.outputs.storefrontUrl }}" >> $GITHUB_STEP_SUMMARY
