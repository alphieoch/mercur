# ---------------------------------------------------------------------------
# OpenStore End-to-End Pipeline — A-to-Z Health Check
#
# Runs on every PR and push to main. Verifies:
#   1. Code quality (lint, type-check)
#   2. All packages build successfully
#   3. Unit + Integration tests pass
#   4. Full stack boots (Postgres, Redis, Meilisearch, API, Storefront)
#   5. HTTP smoke tests verify critical user journeys
# ---------------------------------------------------------------------------
name: E2E — Full Stack Health Check

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

env:
  NODE_VERSION: '20.10.0'
  BUN_VERSION: '1.3.8'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------------
  # Stage 1: Code Quality — Fast feedback, no infra needed
  # -------------------------------------------------------------------------
  quality-gate:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies (root)
        run: bun install --frozen-lockfile

      - name: Lint all packages
        run: bun run lint

      - name: Type-check all packages
        run: bun run check-types

  # -------------------------------------------------------------------------
  # Stage 2: Build Verification — Ensures every app compiles
  # -------------------------------------------------------------------------
  build-gate:
    name: Build All Packages
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build
        env:
          NEXT_PUBLIC_MEDUSA_BACKEND_URL: http://localhost:9000
          NEXT_PUBLIC_DEFAULT_REGION: ke

  # -------------------------------------------------------------------------
  # Stage 3: Unit + Integration Tests — API business logic
  # -------------------------------------------------------------------------
  test-gate:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: build-gate
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: openstore
          POSTGRES_PASSWORD: openstore
          POSTGRES_DB: openstore_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build

      - name: Run API unit tests
        working-directory: apps/api
        run: bun run test:unit
        env:
          DATABASE_URL: postgres://openstore:openstore@localhost:5432/openstore_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret
          COOKIE_SECRET: test-secret
          STORE_CORS: http://localhost:3000
          ADMIN_CORS: http://localhost:7002
          VENDOR_CORS: http://localhost:7001
          AUTH_CORS: http://localhost:3000,http://localhost:7001,http://localhost:7002

      - name: Run HTTP integration tests
        working-directory: integration-tests
        run: bun run test:integration:http
        env:
          DATABASE_URL: postgres://openstore:openstore@localhost:5432/openstore_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret
          COOKIE_SECRET: test-secret
          STORE_CORS: http://localhost:3000
          ADMIN_CORS: http://localhost:7002
          VENDOR_CORS: http://localhost:7001
          AUTH_CORS: http://localhost:3000,http://localhost:7001,http://localhost:7002

  # -------------------------------------------------------------------------
  # Stage 4: Full Stack Smoke Test — API + Storefront + Vendor Portal
  # -------------------------------------------------------------------------
  smoke-test:
    name: Full Stack Smoke Test
    runs-on: ubuntu-latest
    needs: test-gate
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: openstore
          POSTGRES_PASSWORD: openstore
          POSTGRES_DB: openstore_smoke
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      meilisearch:
        image: getmeili/meilisearch:v1.8
        env:
          MEILI_MASTER_KEY: masterKey
        ports:
          - 7700:7700
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build
        env:
          NEXT_PUBLIC_MEDUSA_BACKEND_URL: http://localhost:9000
          NEXT_PUBLIC_DEFAULT_REGION: ke

      # ---- Seed database ----
      - name: Seed API database
        working-directory: apps/api
        run: |
          bun run seed &
          SEED_PID=$!
          sleep 30
          # Wait for seed to complete or timeout
          if kill -0 $SEED_PID 2>/dev/null; then
            echo "Seed still running, waiting..."
            wait $SEED_PID || true
          fi
        env:
          DATABASE_URL: postgres://openstore:openstore@localhost:5432/openstore_smoke
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: smoke-secret
          COOKIE_SECRET: smoke-secret
          STORE_CORS: http://localhost:3000
          ADMIN_CORS: http://localhost:7002
          VENDOR_CORS: http://localhost:7001
          AUTH_CORS: http://localhost:3000,http://localhost:7001,http://localhost:7002
          MEILISEARCH_HOST: http://localhost:7700
          MEILISEARCH_API_KEY: masterKey
        timeout-minutes: 2

      # ---- Start API in background ----
      - name: Start API
        working-directory: apps/api
        run: |
          bun run start &
          echo $! > /tmp/api.pid
        env:
          DATABASE_URL: postgres://openstore:openstore@localhost:5432/openstore_smoke
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: smoke-secret
          COOKIE_SECRET: smoke-secret
          STORE_CORS: http://localhost:3000
          ADMIN_CORS: http://localhost:7002
          VENDOR_CORS: http://localhost:7001
          AUTH_CORS: http://localhost:3000,http://localhost:7001,http://localhost:7002
          MEILISEARCH_HOST: http://localhost:7700
          MEILISEARCH_API_KEY: masterKey

      # ---- Wait for API health ----
      - name: Wait for API to be ready
        run: |
          for i in {1..60}; do
            if curl -sf http://localhost:9000/health; then
              echo "API is up!"
              exit 0
            fi
            echo "Waiting for API... ($i/60)"
            sleep 2
          done
          echo "API failed to start"
          exit 1
        timeout-minutes: 3

      # ---- Build and start Storefront ----
      - name: Build Storefront
        working-directory: apps/storefront
        run: npm run build
        env:
          NEXT_PUBLIC_MEDUSA_BACKEND_URL: http://localhost:9000
          NEXT_PUBLIC_DEFAULT_REGION: ke

      - name: Start Storefront
        working-directory: apps/storefront
        run: |
          npm run start &
          echo $! > /tmp/storefront.pid
        env:
          NEXT_PUBLIC_MEDUSA_BACKEND_URL: http://localhost:9000
          PORT: 3000

      # ---- Wait for Storefront ----
      - name: Wait for Storefront to be ready
        run: |
          for i in {1..60}; do
            if curl -sf http://localhost:3000; then
              echo "Storefront is up!"
              exit 0
            fi
            echo "Waiting for Storefront... ($i/60)"
            sleep 2
          done
          echo "Storefront failed to start"
          exit 1
        timeout-minutes: 3

      # ---- Run smoke tests ----
      - name: Run HTTP smoke tests
        run: |
          chmod +x e2e/smoke-tests.sh
          ./e2e/smoke-tests.sh
        timeout-minutes: 5

      # ---- Cleanup ----
      - name: Cleanup background processes
        if: always()
        run: |
          [ -f /tmp/api.pid ] && kill $(cat /tmp/api.pid) 2>/dev/null || true
          [ -f /tmp/storefront.pid ] && kill $(cat /tmp/storefront.pid) 2>/dev/null || true

  # -------------------------------------------------------------------------
  # Stage 5: Summary
  # -------------------------------------------------------------------------
  e2e-summary:
    name: E2E Summary
    runs-on: ubuntu-latest
    needs: [quality-gate, build-gate, test-gate, smoke-test]
    if: always()
    steps:
      - name: Summarize results
        run: |
          echo "## ✅ E2E Pipeline Complete" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Type Check | ${{ needs.quality-gate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build All Packages | ${{ needs.build-gate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit & Integration Tests | ${{ needs.test-gate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Full Stack Smoke Test | ${{ needs.smoke-test.result }} |" >> $GITHUB_STEP_SUMMARY
